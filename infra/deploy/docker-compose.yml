services:
  redis:
    image: redis:8
    restart: unless-stopped
    volumes:
      - genergi_redis:/data

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8787
      REDIS_URL: redis://redis:6379
    ports:
      - "8787:8787"
    depends_on:
      - redis

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  genergi_redis:
